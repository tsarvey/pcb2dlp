name: Release

# Builds standalone pcb2dlp binaries for Windows, macOS (Intel + Apple
# Silicon), and Linux, then attaches them to a GitHub Release.
#
# Triggered automatically when a tag like `v0.1.0` is pushed, and also
# manually via the Actions tab (workflow_dispatch) for test builds.

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04   # oldest supported = widest glibc compat
            target: linux-x64
            asset: pcb2dlp-linux-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            asset: pcb2dlp-windows-x64.exe
            ext: ".exe"
          - os: macos-13       # Intel
            target: macos-x64
            asset: pcb2dlp-macos-x64
            ext: ""
          - os: macos-14       # Apple Silicon
            target: macos-arm64
            asset: pcb2dlp-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build executable
        run: pyinstaller pcb2dlp.spec

      - name: Smoke test (CLI --help)
        shell: bash
        run: |
          ./dist/pcb2dlp${{ matrix.ext }} --help
          ./dist/pcb2dlp${{ matrix.ext }} convert --help

      - name: Rename artifact
        shell: bash
        run: mv "dist/pcb2dlp${{ matrix.ext }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    # Run for tag pushes and for UI-created releases, but not for manual
    # workflow_dispatch test builds.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # When triggered by a UI-created release, attach to it. When
          # triggered by a tag push, action-gh-release creates the release
          # using the tag name. generate_release_notes only applies to newly
          # created releases; existing ones keep their body.
          generate_release_notes: true
          fail_on_unmatched_files: true
